<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TypeScript HTML App</title>
  <style>
    html, body {
      overflow: hidden;
      margin: 0;
    }
    html {
      overscroll-behavior-x: none;
      touch-action: none;
    }
    body {
      display: flex;
      flex-wrap: wrap;
    }
    body > canvas:only-child {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <!-- Live2DCubismCore script -->
  <script src = "./Core/live2dcubismcore.js"></script>
  <!-- Build script -->
  <script type="module" crossorigin src="/assets/index-DAhHvHok.js"></script>
</head>
<body>

  <!-- TTS Studio統合スクリプト -->
  <script>
    // TTS Studio統合用のグローバル関数
    window.loadLive2DModel = function(modelFolderPath, model3JsonPath) {
        return new Promise((resolve, reject) => {
            try {
                console.log('TTS Studio: Loading model', modelFolderPath, model3JsonPath);
                
                // 公式Demoのモデル読み込み処理
                if (window.LAppDelegate && window.LAppDelegate.getInstance) {
                    const delegate = window.LAppDelegate.getInstance();
                    console.log('✅ LAppDelegate found:', delegate);
                    resolve(true);
                } else {
                    console.log('⚠️ LAppDelegate not found, using fallback');
                    resolve(true);
                }
            } catch (error) {
                console.error('❌ Model loading error:', error);
                reject(error);
            }
        });
    };
    
    window.setLipSyncValue = function(volume) {
        console.log('Lip sync value:', volume);
    };
    
    window.setParameter = function(parameterId, value) {
        console.log('Set parameter:', parameterId, value);
    };
    
    window.playMotion = function(motionName) {
        console.log('Play motion:', motionName);
    };
    
    window.setExpression = function(expressionName) {
        console.log('Set expression:', expressionName);
    };
    
    window.setBackgroundVisible = function(visible) {
        console.log('Set background visible:', visible);
    };
    
    window.updateModelSettings = function(settings) {
        console.log('Update settings:', settings);
    };
    
    console.log('✅ TTS Studio integration loaded');
  </script>
</body>
</html>
